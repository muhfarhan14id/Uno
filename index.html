<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Foto Meme</title>
    <!-- Menggunakan Tailwind CSS via CDN untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Menggunakan Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Efek outline hitam (meme style) untuk teks HTML */
        .meme-text {
            font-family: "Arial Black", Arial, sans-serif;
            font-weight: 900;
            white-space: nowrap;
            touch-action: none; /* Mencegah layar ikut scroll saat drag di HP */
            text-shadow: 
                -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
                 0px  2px 0 #000, 2px  0px 0 #000,  0px -2px 0 #000, -2px 0px 0 #000;
        }
        
        .draggable:hover, .draggable.dragging {
            border: 2px dashed rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <div class="flex flex-col md:flex-row min-h-screen">
        
        <!-- Sidebar Kontrol -->
        <div class="w-full md:w-80 bg-white p-6 border-b md:border-b-0 md:border-r border-gray-200 md:sticky md:top-0 md:h-screen md:overflow-y-auto flex-shrink-0 shadow-sm md:shadow-xl z-20">
            <div class="flex items-center gap-3 mb-8 text-blue-600">
                <i class="fa-solid fa-image text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800">Editor Foto</h1>
            </div>

            <div class="space-y-6">
                <!-- Upload Section -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                        <i class="fa-solid fa-upload text-xs"></i> Unggah Foto
                    </label>
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <i class="fa-solid fa-cloud-arrow-up text-3xl mb-2 text-gray-400"></i>
                            <p class="text-sm text-gray-500 font-medium">Klik untuk pilih foto</p>
                        </div>
                        <input type="file" id="imageInput" class="hidden" accept="image/*" />
                    </label>
                </div>

                <!-- Text Input Section -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                        <i class="fa-solid fa-font text-xs"></i> Isi Teks
                    </label>
                    <input type="text" id="textInput" value="TEKS ANDA" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Ketik teks di sini..." />
                </div>

                <!-- Size Section -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center justify-between">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-sliders text-xs"></i> Ukuran Teks
                        </span>
                        <span id="sizeValue" class="text-blue-600 bg-blue-50 px-2 py-1 rounded text-xs">40px</span>
                    </label>
                    <input type="range" id="sizeInput" min="10" max="200" value="40" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                </div>

                <!-- Color Section -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700">Warna Teks</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="colorInput" value="#FFFFFF" class="w-10 h-10 rounded cursor-pointer border-0 p-0" />
                        <span id="colorValue" class="text-sm text-gray-500 uppercase">#FFFFFF</span>
                    </div>
                </div>

                <!-- Download Button -->
                <div class="pt-4 border-t border-gray-100">
                    <button id="downloadBtn" disabled class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl font-bold transition-all bg-gray-200 text-gray-400 cursor-not-allowed">
                        <i class="fa-solid fa-download"></i> Unduh Hasil
                    </button>
                </div>
            </div>
        </div>

        <!-- Area Kerja (Canvas/Preview) -->
        <div class="flex-1 p-4 md:p-8 flex flex-col items-center overflow-x-auto">
            
            <!-- Tampilan Saat Ada Foto -->
            <div id="workspace" class="hidden flex-col items-center w-full pb-10">
                <div id="imageContainer" class="relative inline-block shadow-2xl bg-white border-2 border-gray-200" style="line-height: 0;">
                    <img id="uploadedImage" alt="Uploaded" class="block w-auto h-auto max-w-full pointer-events-none select-none" style="max-height: 85vh;" />
                    
                    <div id="draggableText" class="draggable meme-text absolute cursor-move select-none border-2 border-dashed border-transparent p-1"
                         style="left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 40px; color: #FFFFFF;">
                        TEKS ANDA
                    </div>
                </div>
                
                <div class="mt-6 text-center text-gray-500 text-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrows-up-down-left-right"></i> Sentuh dan tahan teks untuk memindahkannya
                </div>
            </div>

            <!-- Tampilan Kosong (Belum ada foto) -->
            <div id="emptyState" class="mt-20 text-center text-gray-400 flex flex-col items-center">
                <i class="fa-solid fa-image text-6xl mb-4 text-gray-300"></i>
                <p class="text-xl font-semibold text-gray-500">Belum ada foto</p>
                <p class="text-sm">Silakan unggah foto dari menu kontrol</p>
            </div>

        </div>
    </div>

    <!-- Script Utama (Logika Vanilla JS) -->
    <script>
        // DOM Elements
        const imageInput = document.getElementById('imageInput');
        const textInput = document.getElementById('textInput');
        const sizeInput = document.getElementById('sizeInput');
        const sizeValue = document.getElementById('sizeValue');
        const colorInput = document.getElementById('colorInput');
        const colorValue = document.getElementById('colorValue');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const workspace = document.getElementById('workspace');
        const emptyState = document.getElementById('emptyState');
        const uploadedImage = document.getElementById('uploadedImage');
        const imageContainer = document.getElementById('imageContainer');
        const draggableText = document.getElementById('draggableText');

        // State variables
        let textPosPct = { x: 50, y: 50 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let initialTextPos = { x: 0, y: 0 };

        // 1. Logika Unggah Foto
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedImage.src = event.target.result;
                    
                    // Reset posisi teks ke tengah
                    textPosPct = { x: 50, y: 50 };
                    updateTextPosition();
                    
                    // Tampilkan area kerja
                    emptyState.classList.add('hidden');
                    workspace.classList.remove('hidden');
                    workspace.classList.add('flex');
                    
                    // Aktifkan tombol unduh
                    downloadBtn.disabled = false;
                    downloadBtn.className = "w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl font-bold transition-all bg-blue-600 hover:bg-blue-700 text-white shadow-lg hover:shadow-blue-200";
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. Logika Update Kontrol UI
        textInput.addEventListener('input', function(e) {
            draggableText.textContent = e.target.value || ' ';
        });

        sizeInput.addEventListener('input', function(e) {
            const size = e.target.value;
            draggableText.style.fontSize = `${size}px`;
            sizeValue.textContent = `${size}px`;
        });

        colorInput.addEventListener('input', function(e) {
            const color = e.target.value;
            draggableText.style.color = color;
            colorValue.textContent = color.toUpperCase();
        });

        // 3. Logika Drag and Drop (Mouse & Touch)
        function updateTextPosition() {
            draggableText.style.left = `${textPosPct.x}%`;
            draggableText.style.top = `${textPosPct.y}%`;
        }

        draggableText.addEventListener('pointerdown', function(e) {
            e.preventDefault(); // Hindari default behavior browser
            isDragging = true;
            draggableText.classList.add('dragging');
            dragStart = { x: e.clientX, y: e.clientY };
            initialTextPos = { x: textPosPct.x, y: textPosPct.y };
        });

        window.addEventListener('pointermove', function(e) {
            if (!isDragging) return;
            
            const rect = imageContainer.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;

            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            
            // Konversi pergerakan pixel ke persentase gambar
            const pctX = (dx / rect.width) * 100;
            const pctY = (dy / rect.height) * 100;
            
            textPosPct = {
                x: initialTextPos.x + pctX,
                y: initialTextPos.y + pctY
            };
            
            updateTextPosition();
        });

        window.addEventListener('pointerup', function() {
            if (isDragging) {
                isDragging = false;
                draggableText.classList.remove('dragging');
            }
        });

        // 4. Logika Unduh Gambar (Menggabungkan Gambar + Teks via Canvas)
        downloadBtn.addEventListener('click', function() {
            if (!uploadedImage.src) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Ukuran canvas murni menggunakan resolusi asli gambar
            canvas.width = uploadedImage.naturalWidth;
            canvas.height = uploadedImage.naturalHeight;

            // Gambar foto
            ctx.drawImage(uploadedImage, 0, 0);

            // Perhitungan skala ukuran font
            const currentFontSize = parseInt(sizeInput.value);
            const displayWidth = uploadedImage.clientWidth;
            const scale = canvas.width / displayWidth;
            const scaledFontSize = currentFontSize * scale;

            // Pengaturan gaya font pada canvas
            ctx.font = `900 ${scaledFontSize}px "Arial Black", Arial, sans-serif`;
            ctx.fillStyle = colorInput.value;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.lineJoin = 'round';

            // Outline / Stroke Teks (Tebal)
            ctx.lineWidth = scaledFontSize * 0.15;
            ctx.strokeStyle = 'black';

            // Hitung posisi x dan y (dari persentase ke resolusi asli)
            const finalX = (textPosPct.x / 100) * canvas.width;
            const finalY = (textPosPct.y / 100) * canvas.height;

            // Terapkan ke Canvas: Outline dahulu, baru isi dengan warna
            const textToDraw = textInput.value;
            ctx.strokeText(textToDraw, finalX, finalY);
            ctx.fillText(textToDraw, finalX, finalY);

            // Unduh file
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'foto-meme-edit.png';
            link.href = dataUrl;
            link.click();
        });
    </script>
</body>
</html>
